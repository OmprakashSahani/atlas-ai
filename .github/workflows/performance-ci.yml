name: Atlas AI Performance CI

on:
  push:
    branches:
      - main

  pull_request:
    branches:
      - main

jobs:

  benchmark-and-test:

    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5

        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest matplotlib fastapi uvicorn requests

      - name: Run Test Suite
        run: |
          pytest

      - name: Run Optimizer Benchmark
        run: |
          PYTHONPATH=. python scripts/benchmark_optimizers.py

      - name: Run Transformer Benchmark
        run: |
          PYTHONPATH=. python scripts/benchmark_transformer_generation.py

      - name: Run Distributed Scaling Benchmark
        run: |
          PYTHONPATH=. python scripts/benchmark_distributed_scaling.py
